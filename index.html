<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #008080; }
        body { font-family: Arial, sans-serif; background-color: #e0f2f1; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 10px; box-shadow: 0px 5px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background-color: var(--primary); color: white; padding: 14px; border: none; width: 100%; margin-top: 25px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Weekly Risala Report</h2>
    <form id="dataForm" onsubmit="submitForm(event)">
        <label>Chain Select Karein:</label>
        <select id="chainType" onchange="toggleFields()" required>
            <option value="">-- Select Chain --</option>
            <option value="central">Central Chain</option>
            <option value="department">Department Chain</option>
        </select>

        <label>Name (English Only):</label>
        <input type="text" id="userName" pattern="^[A-Za-z ]+$" title="Only English alphabets allowed" required>

        <label>Mobile Number (10 Digits):</label>
        <input type="text" id="contactNumber" maxlength="10" pattern="^[6-9][0-9]{9}$" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>

        <label>Pincode (6 Digits):</label>
        <input type="text" id="pincode" maxlength="6" pattern="^[1-9][0-9]{5}$" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.length==6) fetchPin(this.value)" required>

        <div id="centralFields" class="hidden">
            <label>Nigran Level:</label>
            <select id="nigranLevel"><option>Alaqa Nigran</option></select>
        </div>
        <div id="deptFields" class="hidden">
            <label>Zimmedar Level:</label>
            <select id="zimmedarLevel"><option>City/Alaqa</option></select>
            <label>Department:</label>
            <select id="departmentList"><option>HR Department</option></select>
        </div>

        <label>District:</label> <input type="text" id="district" readonly>
        <label>Division:</label> <input type="text" id="division" readonly>
        <label>State:</label> <input type="text" id="state" readonly>
        <label>Region:</label> <input type="text" id="region" readonly>

        <label>Weekly Risala Report (Max 4 Digits):</label>
        <input type="text" id="risalaReport" maxlength="4" pattern="^[1-9][0-9]{0,3}$" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>

        <button type="submit" class="btn-submit">Submit Report</button>
    </form>
</div>

<script>
    const scriptURL = "PASTE_YOUR_WEB_APP_URL_HERE";

    function toggleFields() {
        const c = document.getElementById("chainType").value;
        document.getElementById("centralFields").classList.toggle("hidden", c !== 'central');
        document.getElementById("deptFields").classList.toggle("hidden", c !== 'department');
    }

    async function fetchPin(pin) {
        const res = await fetch(scriptURL + "?action=pincode&pin=" + pin);
        const d = await res.json();
        if(d.district) {
            document.getElementById("district").value = d.district;
            document.getElementById("division").value = d.division;
            document.getElementById("state").value = d.state;
            document.getElementById("region").value = d.region;
        }
    }

    async function submitForm(e) {
        e.preventDefault();
        const data = {
            chainType: document.getElementById("chainType").value,
            userName: document.getElementById("userName").value,
            contactNumber: document.getElementById("contactNumber").value,
            pincode: document.getElementById("pincode").value,
            nigranLevel: document.getElementById("nigranLevel").value,
            zimmedarLevel: document.getElementById("zimmedarLevel").value,
            departmentList: document.getElementById("departmentList").value,
            risalaReport: document.getElementById("risalaReport").value,
            district: document.getElementById("district").value,
            division: document.getElementById("division").value,
            state: document.getElementById("state").value,
            region: document.getElementById("region").value
        };
        await fetch(scriptURL, {method: "POST", body: JSON.stringify(data)});
        alert("Report Submitted Successfully!");
    }
</script>
</body>
</html>
