<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{font-family:sans-serif; background:#e0f2f1; padding:20px;}
    .container{background:white; max-width:500px; margin:auto; padding:20px; border-radius:10px; border-top:6px solid #008080;}
    input,select{width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;}
</style>
</head>
<body>
<div class="container">
    <form id="dataForm" onsubmit="submitForm(event)">
        <select id="chainType" onchange="toggleFields()" required>
            <option value="">-- Select Chain --</option>
            <option value="central">Central</option>
            <option value="department">Department</option>
        </select>
        
        <input type="text" id="userName" placeholder="Name (Only Alphabets)" pattern="[A-Za-z ]+" title="Sirf English Alphabet use karein" required>
        <input type="text" id="contactNumber" placeholder="Mobile (10 Digits)" pattern="[6-9][0-9]{9}" maxlength="10" required>
        <input type="text" id="pincode" placeholder="Pincode (6 Digits)" pattern="[1-9][0-9]{5}" maxlength="6" oninput="fetchPin(this.value)" required>
        
        <div id="centralFields" style="display:none;">
            <select id="nigranLevel"><option value="">Select Nigran Level</option><option>Alaqa Nigran</option></select>
        </div>
        <div id="deptFields" style="display:none;">
            <select id="zimmedarLevel"><option value="">Select Level</option><option>City</option></select>
            <select id="departmentList"><option value="">Select Department</option><option>HR Department</option></select>
        </div>
        
        <input type="text" id="district" placeholder="District" readonly>
        <input type="text" id="division" placeholder="Division" readonly>
        <input type="text" id="state" placeholder="State" readonly>
        <input type="text" id="region" placeholder="Region" readonly>
        <input type="text" id="risalaReport" placeholder="Weekly Risala Report (Max 4 Digits)" pattern="[1-9][0-9]{0,3}" maxlength="4" required>
        
        <button type="submit" id="btn" style="background:#008080; color:white; border:none; padding:15px; width:100%;">Submit Report</button>
    </form>
</div>
<script>
    const scriptURL = "PASTE_YOUR_NEW_WEB_APP_URL";
    
    function toggleFields() {
        const c = document.getElementById("chainType").value;
        document.getElementById("centralFields").style.display = (c === 'central' ? 'block' : 'none');
        document.getElementById("deptFields").style.display = (c === 'department' ? 'block' : 'none');
    }

    async function fetchPin(pin) {
        if(pin.length !== 6) return;
        const res = await fetch(scriptURL + "?action=pincode&pin=" + pin);
        const d = await res.json();
        if(d.district) {
            document.getElementById("district").value = d.district;
            document.getElementById("division").value = d.division;
            document.getElementById("state").value = d.state;
            document.getElementById("region").value = d.region;
        } else { alert("Pincode Not Found"); }
    }

    async function submitForm(e) {
        e.preventDefault();
        const btn = document.getElementById("btn");
        btn.disabled = true; btn.innerText = "Submitting...";
        const data = {
            chainType: document.getElementById("chainType").value,
            userName: document.getElementById("userName").value,
            contactNumber: document.getElementById("contactNumber").value,
            pincode: document.getElementById("pincode").value,
            nigranLevel: document.getElementById("nigranLevel").value,
            zimmedarLevel: document.getElementById("zimmedarLevel").value,
            departmentList: document.getElementById("departmentList").value,
            risalaReport: document.getElementById("risalaReport").value,
            district: document.getElementById("district").value,
            division: document.getElementById("division").value,
            state: document.getElementById("state").value,
            region: document.getElementById("region").value
        };
        const res = await fetch(scriptURL, {method: "POST", body: JSON.stringify(data)});
        const result = await res.json();
        alert(result.message);
        btn.disabled = false; btn.innerText = "Submit Report";
    }
</script>
</body>
</html>
