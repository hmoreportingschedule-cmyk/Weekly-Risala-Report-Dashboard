<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Risala Report</title>
    <style>
        :root { --primary: #008080; }
        body { font-family: Arial, sans-serif; background-color: #e0f2f1; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 10px; box-shadow: 0px 5px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background-color: var(--primary); color: white; padding: 14px; border: none; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Weekly Risala Report</h2>
    <form id="dataForm" onsubmit="submitForm(event)">
        
        <select id="chainType" onchange="toggleFields()" required>
            <option value="">-- Select Chain --</option>
            <option value="nigran">Nigran</option>
            <option value="department">Department</option>
        </select>

        <div id="allFields" class="hidden">
            
            <input type="text" id="userName" placeholder="Name (English Only)" pattern="^[a-zA-Z\s]+$" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')" title="Sirf English letters allowed hain" required>

            <input type="text" id="contactNumber" placeholder="Mobile Number (10 Digits)" maxlength="10" pattern="^[6-9][0-9]{9}$" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.startsWith('0')) this.value = this.value.substring(1);" required>

            <input type="text" id="pincode" placeholder="Pincode (6 Digits)" maxlength="6" pattern="^[1-9][0-9]{5}$" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.startsWith('0')) this.value = this.value.substring(1); if(this.value.length==6) fetchPin(this.value);" required>

            <div id="centralFields" class="hidden">
                <select id="nigranLevel">
                    <option value="">Select Nigran Level</option>
                    <option>Region Nigran</option>
                    <option>State Nigran</option>
                    <option>Division Nigran</option>
                    <option>District/Cirlcle Nigran</option>
                    <option>Alaqa/City Nigran</option>
                    <option>Zaili Halqa Nigran</option>
                </select>
            </div>
            
            <div id="deptFields" class="hidden">
                <select id="zimmedarLevel">
                    <option value="">Select Zimmedar Level</option>
                    <option>RHM</option>
                    <option>Hind Satah (HOD)</option>
                    <option>Region</option>
                    <option>State</option>
                    <option>Division</option>
                    <option>District/Circle</option>
                    <option>Alaqa/City</option>
                    <option>Moallim/Mudarris</option>
                    <option>Imaam/Moazzin</option>
                    <option>Office / Assistant (HOD/RHM)</option>
                </select>
                <select id="departmentList">
                    <option value="">Select Department</option>
                    <option>Audit Department</option>
                    <option>Al Madinatul Ilmiya</option>
                    <option>Assasajat</option>
                    <option>Construction Department</option>
                    <option>Darul Ifta Ahle Sunnat</option>
                    <option>Darul Madinah English School</option>
                    <option>Darus Sunnah</option>
                    <option>Education Department</option>
                    <option>Faizan Weekend Islamic Classes</option>
                    <option>Faizane Madina</option>
                    <option>FGN Channel</option>
                    <option>Finance Department</option>
                    <option>Gareeb Nawaz Online Academy</option>
                    <option>Gharelu Sadqa Box</option>
                    <option>GNRF (Plantation)</option>
                    <option>Haftawar Ijtema O Madani Muzakara</option>
                    <option>Hajj O Umrah</option>
                    <option>Hind Mushawarat Office</option>
                    <option>HMO</option>
                    <option>HR Department</option>
                    <option>Imamat Course</option>
                    <option>Imame Masajid</option>
                    <option>Islahe Aamaal</option>
                    <option>IT Department</option>
                    <option>Jamiatul Madina Boys</option>
                    <option>Jamiatul Madina Girls</option>
                    <option>Kafan Dafan</option>
                    <option>Khuddamul Masajid wal Madaris</option>
                    <option>Legal Advisory Board</option>
                    <option>Madani Atiyyat Box</option>
                    <option>Madani Courses</option>
                    <option>Madrasatul Madina Balighan</option>
                    <option>Madrasatul Madina Boys</option>
                    <option>Madrasatul Madina Girls</option>
                    <option>Majlise Rabita</option>
                    <option>Maktabatul Madina</option>
                    <option>Model Jamia Tul Madina</option>
                    <option>Mohabbate Badhao</option>
                    <option>Muawanat Barae Islami Behne</option>
                    <option>Property Department</option>
                    <option>Purchase Department</option>
                    <option>Qafila Department</option>
                    <option>Rabta Barae Khususi Tajiran</option>
                    <option>Rabta Barae Tajiran</option>
                    <option>Rabta Bil Ulama wal Mashaikh</option>
                    <option>Reporting Desk - HMO</option>
                    <option>Roohani Ilaj</option>
                    <option>Schedule - HMO</option>
                    <option>Sharai Rehnumai Desk</option>
                    <option>Social Media</option>
                    <option>Special Persons Department</option>
                    <option>TAD</option>
                    <option>Taqseeme Rasail</option>
                    <option>Tibbi Ilaj</option>
                    <option>Translation Department</option>
                    <option>Ushr wa Atraf Gaon</option>
                    <option>Waqf Amlak</option>
                </select>
            </div>

            <input type="text" id="district" placeholder="District" readonly required>
            <input type="text" id="division" placeholder="Division" readonly>
            <input type="text" id="state" placeholder="State" readonly>
            <input type="text" id="region" placeholder="Region" readonly>

            <input type="text" id="risalaReport" placeholder="Weekly Risala Report (Max 4 Digits)" maxlength="4" pattern="^[1-9][0-9]{0,3}$" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.startsWith('0')) this.value = this.value.substring(1);" required>

            <button type="submit" class="btn-submit" id="submitBtn">Submit Report</button>

        </div> 
    </form>
</div>

<script>
    // YAHAN APNA NAYA DEPLOY KIYA HUA GOOGLE SCRIPT URL ZAROOR DAALEIN
    const scriptURL = "https://script.google.com/macros/s/AKfycbwTzDXQRrqc9eW6K8h0dOH0EjYe3ARH7rKS47eWYKzExTIpgyLRmGK4sCPhbwT1SVPh/exec";
    
    // UPDATE: Frontend memory cache for instant loading
    let localPinCache = {}; 

    function toggleFields() {
        const c = document.getElementById("chainType").value;
        const allFields = document.getElementById("allFields");

        if (c === "") {
            allFields.classList.add("hidden");
        } else {
            allFields.classList.remove("hidden");
            document.getElementById("centralFields").classList.toggle("hidden", c !== 'nigran');
            document.getElementById("deptFields").classList.toggle("hidden", c !== 'department');
        }
    }

    async function fetchPin(pin) {
        // Agar yeh pincode pehle se local cache me hai, toh 0.1s mein load hoga
        if (localPinCache[pin]) {
            document.getElementById("district").value = localPinCache[pin].district;
            document.getElementById("division").value = localPinCache[pin].division;
            document.getElementById("state").value = localPinCache[pin].state;
            document.getElementById("region").value = localPinCache[pin].region;
            document.getElementById("pincode").setCustomValidity(""); 
            return;
        }

        try {
            document.getElementById("district").value = "Loading...";
            
            const res = await fetch(scriptURL + "?action=pincode&pin=" + pin);
            const d = await res.json();
            
            if(d && d.district) {
                // Naya data aane par usko cache mein save kar lenge
                localPinCache[pin] = d; 

                document.getElementById("district").value = d.district;
                document.getElementById("division").value = d.division;
                document.getElementById("state").value = d.state;
                document.getElementById("region").value = d.region;
                document.getElementById("pincode").setCustomValidity(""); 
            } else {
                document.getElementById("district").value = "";
                document.getElementById("division").value = "";
                document.getElementById("state").value = "";
                document.getElementById("region").value = "";
                document.getElementById("pincode").setCustomValidity("Yeh Pincode Sheet mein record nahi hai. Kripya sahi Pincode daalein.");
                document.getElementById("pincode").reportValidity();
            }
        } catch(error) {
            console.error("API Error", error);
        }
    }

    async function submitForm(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.innerText = "Submitting...";
        
        const data = {
            chainType: document.getElementById("chainType").options[document.getElementById("chainType").selectedIndex].text,
            userName: document.getElementById("userName").value,
            contactNumber: document.getElementById("contactNumber").value,
            pincode: document.getElementById("pincode").value,
            nigranLevel: document.getElementById("nigranLevel") ? document.getElementById("nigranLevel").value : "",
            zimmedarLevel: document.getElementById("zimmedarLevel") ? document.getElementById("zimmedarLevel").value : "",
            departmentList: document.getElementById("departmentList") ? document.getElementById("departmentList").value : "",
            risalaReport: document.getElementById("risalaReport").value,
            district: document.getElementById("district").value,
            division: document.getElementById("division").value,
            state: document.getElementById("state").value,
            region: document.getElementById("region").value
        };
        
        try {
            const res = await fetch(scriptURL, {method: "POST", body: JSON.stringify(data)});
            const result = await res.json();
            alert(result.message);
            if(result.status === "Success") {
                document.getElementById("dataForm").reset();
                toggleFields(); 
            }
        } catch(err) {
            alert("Network Error. Please try again.");
        }
        
        btn.disabled = false; btn.innerText = "Submit Report";
    }
</script>
</body>
</html>
