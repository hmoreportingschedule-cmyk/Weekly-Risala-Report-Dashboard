<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Weekly Risala Report</title>
<style>:root{--primary:#008080;} body{font-family:sans-serif; background:#e0f2f1; padding:20px; display:flex; justify-content:center;} .container{background:white; width:100%; max-width:500px; padding:20px; border-radius:10px; border-top:6px solid var(--primary);} input,select{width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;} button{background:var(--primary); color:white; padding:15px; width:100%; border:none; border-radius:5px; cursor:pointer;}</style>
</head>
<body>
<div class="container">
    <h2 id="heading" style="color:var(--primary); text-align:center;">Loading...</h2>
    <form id="dataForm" onsubmit="submitForm(event)">
        <select id="chainType" onchange="toggleFields()" required><option value="">-- Select Chain --</option><option value="central">Central</option><option value="department">Department</option></select>
        <input type="text" id="userName" placeholder="Name" required>
        <input type="tel" id="contactNumber" placeholder="Mobile Number" required>
        <input type="text" id="pincode" placeholder="Pincode" oninput="if(this.value.length==6) fetchPin(this.value)" required>
        <div id="extraFields"></div>
        <input type="text" id="district" placeholder="District" readonly>
        <input type="text" id="division" placeholder="Division" readonly>
        <input type="text" id="state" placeholder="State" readonly>
        <input type="text" id="region" placeholder="Region" readonly>
        <input type="number" id="risalaReport" placeholder="Risala Count" required>
        <button type="submit" id="submitBtn">Submit Report</button>
    </form>
</div>
<script>
    const scriptURL = "PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE";
    
    async function fetchPin(pin) {
        const res = await fetch(scriptURL + "?action=pincode&pin=" + pin);
        const d = await res.json();
        if(d) {
            document.getElementById("district").value = d.district;
            document.getElementById("division").value = d.division;
            document.getElementById("state").value = d.state;
            document.getElementById("region").value = d.region;
        }
    }

    async function submitForm(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.innerText = "Submitting..."; btn.disabled = true;
        const data = {
            chainType: document.getElementById("chainType").value,
            userName: document.getElementById("userName").value,
            contactNumber: document.getElementById("contactNumber").value,
            pincode: document.getElementById("pincode").value,
            risalaReport: document.getElementById("risalaReport").value,
            nigranLevel: document.getElementById("chainType").value === "central" ? "Central" : "",
            zimmedarLevel: "", departmentList: ""
        };
        const res = await fetch(scriptURL, {method: "POST", body: JSON.stringify(data)});
        const result = await res.json();
        alert(result.message);
        btn.innerText = "Submit Report"; btn.disabled = false;
    }
</script>
</body>
</html>
